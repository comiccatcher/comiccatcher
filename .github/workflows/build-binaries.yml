name: Build Binaries

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      build_linux:
        description: 'Build Linux AppImage'
        required: true
        type: boolean
        default: true
      build_windows:
        description: 'Build Windows EXE'
        required: true
        type: boolean
        default: true
      build_macos:
        description: 'Build macOS DMG'
        required: true
        type: boolean
        default: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-linux:
    if: github.event_name == 'release' || github.event.inputs.build_linux == 'true'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller Pillow python-appimage .
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 curl
      - name: Build AppImage
        run: python packaging/build.py --linux
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ComicCatcher-Linux
          path: dist/ComicCatcher-x86_64.AppImage
      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ComicCatcher-x86_64.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    if: github.event_name == 'release' || github.event.inputs.build_windows == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller Pillow .
      - name: Build EXE
        run: python packaging/build.py --windows
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ComicCatcher-Windows
          path: dist/ComicCatcher.exe
      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ComicCatcher.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    if: github.event_name == 'release' || github.event.inputs.build_macos == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller Pillow .
      - name: Build DMG
        run: python packaging/build.py --macos
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ComicCatcher-macOS
          path: dist/ComicCatcher-macOS.dmg
      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ComicCatcher-macOS.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

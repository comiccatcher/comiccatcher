name: Unified Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_linux:
        description: 'Build Linux Packages (AppImage & DEB)'
        required: true
        type: boolean
        default: true
      build_windows:
        description: 'Build Windows Packages (EXE & MSI)'
        required: true
        type: boolean
        default: true
      build_macos:
        description: 'Build macOS DMG'
        required: true
        type: boolean
        default: true
      publish_pypi:
        description: 'Publish to PyPI'
        required: true
        type: boolean
        default: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish-pypi:
    if: github.event_name == 'push' || github.event.inputs.publish_pypi == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      - name: Build package
        run: |
          bash scripts/ops/build_package.sh
      - name: Create GitHub Release and Upload Source
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
          draft: false
          prerelease: ${{ contains(github.ref, 'a') || contains(github.ref, 'b') || contains(github.ref, 'rc') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish to PyPI
        if: github.event_name == 'push' || github.event.inputs.publish_pypi == 'true'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          twine upload dist/* --skip-existing

  build-linux:
    if: github.event_name == 'push' || github.event.inputs.build_linux == 'true'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller Pillow python-appimage .
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 curl
      - name: Build Linux Packages
        run: python packaging/build.py --linux
      - name: Upload AppImage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ComicCatcher-Linux-AppImage
          path: dist/ComicCatcher-x86_64.AppImage
      - name: Upload DEB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ComicCatcher-Linux-DEB
          path: dist/comiccatcher-amd64.deb
      - name: Upload to Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ComicCatcher-x86_64.AppImage
            dist/comiccatcher-amd64.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    if: github.event_name == 'push' || github.event.inputs.build_windows == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller Pillow .
      - name: Build EXE Folder
        run: python packaging/build.py --windows
      - name: Get Version
        id: get_version
        shell: bash
        run: |
          VERSION=$(python -c "import sys; sys.path.insert(0, 'src'); from comiccatcher import __version__; print(__version__)")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
      - name: Harvest folder files using WiX Heat
        run: |
          heat dir dist/ComicCatcher -cg ComicCatcherComponents -dr INSTALLFOLDER -scom -sreg -sfrag -srd -gg -out packaging/dist_files.wxs
      - name: Compile WiX Installer
        run: |
          candle -dProductVersion="${{ env.VERSION }}" packaging/installer.wxs packaging/dist_files.wxs
      - name: Link and Build MSI
        run: |
          light -ext WixUIExtension -b dist/ComicCatcher installer.wixobj dist_files.wixobj -o dist/ComicCatcher-${{ env.VERSION }}.msi
      - name: Upload MSI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ComicCatcher-Windows-MSI
          path: dist/ComicCatcher-${{ env.VERSION }}.msi
      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ComicCatcher-Windows-EXE
          path: dist/ComicCatcher.exe
      - name: Upload to Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ComicCatcher-${{ env.VERSION }}.msi
            dist/ComicCatcher.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    if: github.event_name == 'push' || github.event.inputs.build_macos == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller Pillow .
      - name: Build DMG
        run: python packaging/build.py --macos
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ComicCatcher-macOS
          path: dist/ComicCatcher-macOS.dmg
      - name: Upload to Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ComicCatcher-macOS.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
